name: Keep Render Services Warm (Free)

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: |
          curl -fsS https://tambayan-talks-api.onrender.com/health || true
      - name: Ping Frontend
        run: |
          curl -fsS https://tambayan-talks.onrender.com/ || true

databases:
  - name: tambayan-talks-db
    databaseName: tambayan_talks
    user: tambayan_talks
    plan: free

services:
  # ---------------- API (Node/Express + Socket.IO) ----------------
  - type: web
    name: tambayan-talks-api
    env: node
    rootDir: server
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tambayan-talks-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      # Client URL(s) that should be allowed to call the API
      - key: CORS_ORIGINS
        sync: false
      # Used to build email verification links
      - key: APP_BASE_URL
        sync: false
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      - key: ADMIN_CREATE_TEACHER_KEY
        sync: false
      # SMTP (only required if REQUIRE_EMAIL_VERIFICATION=true)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  # ---------------- Frontend (Vite static site) ----------------
  - type: web
    name: tambayan-talks-client
    env: static
    rootDir: client
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to the API service URL, e.g. https://tambayan-talks-api.onrender.com
      - key: VITE_API_URL
        sync: false
      # Optional: if your Socket.IO endpoint differs from API URL
      - key: VITE_SOCKET_URL
        sync: false
